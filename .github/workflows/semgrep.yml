name: Semgrep Scan

on:
  workflow_dispatch:   # Run manually
  pull_request:        # Also runs on PRs

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (JSON + SARIF)
        run: |
          semgrep --config=p/ci --include '**/*.php' --json > semgrep-results.json
          semgrep --config=p/ci --include '**/*.php' --sarif > semgrep-results.sarif

      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-json
          path: semgrep-results.json

      - name: Upload SARIF for GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep-results.sarif
